<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${product != null ? product.name + ' - SportZone' : 'Không tìm thấy sản phẩm - SportZone'}">SportZone</title>
    <link rel="stylesheet" href="/css/client/base.css">
    <link rel="stylesheet" href="/css/client/header.css">
    <link rel="stylesheet" href="/css/client/footer.css">
    <link rel="stylesheet" href="/css/client/toast.css">
    <style>
      .product-detail-container {
        padding: 4rem 1rem;
        display: grid;
        grid-template-columns: 1fr;
        gap: 3rem;
      }

      @media (min-width: 768px) {
        .product-detail-container {
          grid-template-columns: 1fr 1fr;
        }
      }

      .product-detail-image img {
        width: 100%;
        border-radius: 1rem;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        object-fit: cover;
      }

      .product-detail-info h1 {
        font-size: 2.5rem;
        font-weight: bold;
        color: var(--gray-900);
        margin-bottom: 0.5rem;
      }

      .product-detail-info .category {
        color: var(--primary-blue);
        font-weight: 600;
        margin-bottom: 1.5rem;
      }

      .product-detail-info .price-container {
        display: flex;
        align-items: center;
        gap: 1rem;
        margin-bottom: 1.5rem;
      }

      .product-detail-info .sale-price {
        font-size: 2rem;
        font-weight: bold;
        color: #e74c3c;
      }

      .product-detail-info .base-price {
        font-size: 1.25rem;
        color: var(--gray-400);
        text-decoration: line-through;
      }

      .product-detail-info .description {
        font-size: 1.1rem;
        color: var(--gray-600);
        margin-bottom: 2rem;
        line-height: 1.8;
      }

      .product-detail-info .add-to-cart-btn {
        width: 100%;
        padding: 1rem 0;
        font-size: 1.25rem;
        background-color: var(--primary-blue);
        color: white;
        border: none;
        border-radius: 0.5rem;
        font-weight: bold;
        cursor: pointer;
        transition: background-color 0.3s;
      }

      .product-detail-info .add-to-cart-btn:hover {
        background-color: #1d4ed8;
      }
    </style>
  </head>
  <body>
    
    <div th:replace="~{client/fragments/header :: header_fragment}"></div>

    <div class="container product-detail-container" th:if="${product != null}">
      <!-- Cột Trái: Ảnh sản phẩm -->
      <div class="product-detail-image">
        <img th:src="${product.thumbnailUrl != null ? product.thumbnailUrl : 'https://images.pexels.com/photos/2529148/pexels-photo-2529148.jpeg?auto=compress&amp;cs=tinysrgb&amp;w=800'}" th:alt="${product.name}">
      </div>

      <!-- Cột Phải: Thông tin chi tiết -->
      <div class="product-detail-info">
        <div class="category" th:text="${product.gender != null ? product.gender : 'Unisex'}">Danh mục</div>
        <h1 th:text="${product.name}">Tên sản phẩm</h1>
        
        <div class="sale-countdown-wrapper" th:if="${product.saleEnd != null}" style="display: flex; align-items: center; gap: 0.25rem; margin-bottom: 1.5rem; background: #fef2f2; padding: 0.5rem 1rem; border-radius: 0.25rem; width: fit-content;">
            <svg style="color: #ef4444; width: 16px; height: 16px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"></circle>
              <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
            <span class="sale-timer-text" style="font-size: 0.85rem; font-weight: bold; color: #b91c1c;" th:data-sale-end="${product.saleEnd}">Đang tính toán Flash Sale...</span>
        </div>

        <div class="price-container">
          <span class="sale-price" th:text="${product.salePrice != null ? #numbers.formatDecimal(product.salePrice, 0, 'COMMA', 0, 'POINT') + 'đ' : #numbers.formatDecimal(product.basePrice, 0, 'COMMA', 0, 'POINT') + 'đ'}">0đ</span>
          <span class="base-price" th:if="${product.salePrice != null and product.basePrice > product.salePrice}" th:text="${#numbers.formatDecimal(product.basePrice, 0, 'COMMA', 0, 'POINT') + 'đ'}">0đ</span>
        </div>

        <p class="description" th:text="${product.description}">
          Mô tả chi tiết sản phẩm sẽ hiển thị ở đây.
        </p>

        <button class="add-to-cart-btn" th:data-name="${product.name}" onclick="alert('Đã thêm ' + this.dataset.name + ' vào giỏ hàng!')">
          THÊM VÀO GIỎ HÀNG
        </button>
      </div>
    </div>

    <div class="container" th:if="${product == null}" style="text-align: center; padding: 4rem;">
      <h2>Sản phẩm không tồn tại hoặc đã bị xóa.</h2>
      <a href="/" style="display: inline-block; margin-top: 1rem; color: var(--primary-blue);">Quay lại trang chủ</a>
    </div>

   
    <script>
        
    </script>
  </body>
</html>
