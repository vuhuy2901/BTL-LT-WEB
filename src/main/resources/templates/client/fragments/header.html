<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<header th:fragment="header_fragment">
  <div class="container">
    <a href="/" class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polyline>
      </svg>
      <span>SportZone</span>
    </a>

    <nav>
      <a th:href="@{/}">Tất cả sản phẩm</a>

      <!-- Dropdown Danh mục -->
      <div class="nav-dropdown-wrapper">
        <a href="#" style="display:flex;align-items:center;gap:.25rem;">
          Danh mục
          <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><polyline points="6 9 12 15 18 9"/></svg>
        </a>
        <div class="nav-dropdown">
          <div th:if="${#lists.isEmpty(categories)}" style="padding:.5rem 1.5rem;color:#6b7280;font-size:.875rem;">Không có dữ liệu</div>
          <a th:each="c : ${categories}" th:href="@{/filter(categoryId=${c.id})}" th:text="${c.name}">Danh mục</a>
        </div>
      </div>

      <!-- Dropdown Môn thể thao -->
      <div class="nav-dropdown-wrapper">
        <a href="#" style="display:flex;align-items:center;gap:.25rem;">
          Môn thể thao
          <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><polyline points="6 9 12 15 18 9"/></svg>
        </a>
        <div class="nav-dropdown">
          <div th:if="${#lists.isEmpty(sports)}" style="padding:.5rem 1.5rem;color:#6b7280;font-size:.875rem;">Không có dữ liệu</div>
          <a th:each="s : ${sports}" th:href="@{/filter(sportId=${s.id})}" th:text="${s.name}">Thể thao</a>
        </div>
      </div>

      <!-- Dropdown Thương hiệu -->
      <div class="nav-dropdown-wrapper">
        <a href="#" style="display:flex;align-items:center;gap:.25rem;">
          Thương hiệu
          <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><polyline points="6 9 12 15 18 9"/></svg>
        </a>
        <div class="nav-dropdown">
          <div th:if="${#lists.isEmpty(brands)}" style="padding:.5rem 1.5rem;color:#6b7280;font-size:.875rem;">Không có dữ liệu</div>
          <a th:each="b : ${brands}" th:href="@{/filter(brandId=${b.id})}" th:text="${b.name}">Thương hiệu</a>
        </div>
      </div>
    </nav>

    <div class="header-actions">
      <div class="search-container">
        <input type="text" class="search-input" placeholder="Tìm kiếm sản phẩm...">
        <button class="icon-btn" title="Search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
        </button>
      </div>

      <button class="icon-btn" id="header-wishlist-btn" title="Wishlist">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
      </button>

      <div class="account-wrapper">
        <button class="icon-btn" id="account-btn" th:data-logged-in="${session.currentUser != null}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
          </svg>
        </button>
        <div id="account-dropdown" class="account-dropdown" th:if="${session.currentUser != null}">
          <div class="dropdown-header">
            <strong>Tài khoản</strong>
            <div style="font-size:.85rem;color:#6b7280;margin-top:.25rem;" th:text="${session.currentUser.fullName}">Tên</div>
          </div>
          <a href="/profile">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            Hồ sơ
          </a>
          <a href="/orders">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 10a4 4 0 0 1-8 0"/><path d="M3.103 6.034h17.794"/><path d="M3.4 5.467a2 2 0 0 0-.4 1.2V20a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6.667a2 2 0 0 0-.4-1.2l-2-2.667A2 2 0 0 0 17 2H7a2 2 0 0 0-1.6.8z"/></svg>
            Đơn hàng
          </a>
          <a href="/admin" th:if="${session.currentUser.role == 'ADMIN' || session.currentUser.role == 'STAFF'}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="7" height="7"></rect>
              <rect x="14" y="3" width="7" height="7"></rect>
              <rect x="14" y="14" width="7" height="7"></rect>
              <rect x="3" y="14" width="7" height="7"></rect>
            </svg>
            Quản lí
          </a>
          <a href="#" id="logout-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Đăng xuất
          </a>
        </div>
      </div>

      <button class="icon-btn" id="cart-btn" title="Shopping Cart">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
        </svg>
        <span class="cart-badge" id="cart-count" style="display:none;">0</span>
      </button>
    </div>
  </div>

  <!-- ─── Script nằm TRONG fragment để Thymeleaf include cùng ─── -->
  <script>
    /* ── showToast dùng chung cho toàn trang ── */
    function showToast(message, type = 'info') {
      let container = document.getElementById('toast-container');
      if (!container) {
        container = document.createElement('div');
        container.id = 'toast-container';
        document.body.appendChild(container);
      }
      const toast = document.createElement('div');
      toast.className = `toast-msg toast-${type}`;
      toast.innerText = message;
      container.appendChild(toast);
      setTimeout(() => {
        toast.style.opacity = '0';
        setTimeout(() => toast.parentNode?.removeChild(toast), 300);
      }, 3000);
    }

    document.addEventListener('DOMContentLoaded', () => {

      /* ── Account dropdown ── */
      const accountBtn = document.getElementById('account-btn');
      if (accountBtn) {
        accountBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          const isLoggedIn = sessionStorage.getItem('currentUser') != null;
          if (isLoggedIn) {
            const menu = document.getElementById('account-dropdown');
            if (menu) {
              menu.classList.toggle('active');
            } else {
              window.location.href = '/login';
            }
          } else {
            window.location.href = '/login';
          }
        });

        // Đóng dropdown khi click ra ngoài
        document.addEventListener('click', (event) => {
          const menu = document.getElementById('account-dropdown');
          if (menu && menu.classList.contains('active')
              && !menu.contains(event.target)
              && !accountBtn.contains(event.target)) {
            menu.classList.remove('active');
          }
        });
      }

      /* ── Đăng xuất ── */
      const logoutBtn = document.getElementById('logout-btn');
      if (logoutBtn) {
        logoutBtn.addEventListener('click', async (e) => {
          e.preventDefault();
          try {
            const res  = await fetch('/logout', { method: 'POST', headers: { 'Content-Type': 'application/json' } });
            const data = await res.json();
            if (data.status === 'SUCCESS') {
              sessionStorage.removeItem('currentUser');
              showToast('Đăng xuất thành công', 'success');
              setTimeout(() => window.location.href = '/', 1500);
            } else {
              showToast('Đăng xuất thất bại: ' + (data.message || 'Lỗi không xác định'), 'error');
            }
          } catch (error) {
            console.error('Logout error:', error);
            showToast('Lỗi kết nối khi đăng xuất', 'error');
          }
        });
      }

      /* ── Wishlist ── */
      const wishlistBtn = document.getElementById('header-wishlist-btn');
      if (wishlistBtn) {
        wishlistBtn.addEventListener('click', () => {
          const isLoggedIn = sessionStorage.getItem('currentUser') != null;
          if (!isLoggedIn) {
            showToast('Vui lòng đăng nhập để xem danh sách yêu thích', 'error');
            setTimeout(() => window.location.href = '/login', 1500);
            return;
          }
          window.location.href = '/wishlist';
        });
      }

      /* ── Giỏ hàng ── */
      const cartBtn = document.getElementById('cart-btn');
      if (cartBtn) {
        cartBtn.addEventListener('click', () => {
          const isLoggedIn = sessionStorage.getItem('currentUser') != null;
          if (!isLoggedIn) {
            showToast('Vui lòng đăng nhập để xem giỏ hàng', 'error');
            setTimeout(() => window.location.href = '/login', 1500);
            return;
          }
          window.location.href = '/cart';
        });
      }

    });
  </script>
</header>

</body>
</html>
